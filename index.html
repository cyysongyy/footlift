<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --teal:#1D9E75; --tl:#E1F5EE; --td:#0F6E56;
  --amb:#EF9F27; --amb-l:#FDF0DC;

}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:76px;}
.mono{font-family:'DM Mono',monospace;}
.container{max-width:520px;margin:0 auto;padding:1rem 1rem 2rem;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:15px;}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--text);}
a{color:var(--teal);}
.hidden{display:none!important;}

/* Lock screen */
.lock-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.lock-icon{font-size:38px;color:var(--teal);margin-bottom:14px;}
.lock-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.lock-brand{font-family:'DM Mono',monospace;font-size:26px;font-weight:700;letter-spacing:1px;color:var(--teal);margin-bottom:4px;}
.lock-brand-sub{font-size:11px;color:var(--text3);letter-spacing:3px;margin-bottom:18px;}
.lock-sub{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.8;}
.lock-input{width:100%;max-width:280px;padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);text-align:center;font-size:18px;letter-spacing:4px;margin-bottom:12px;}
.lock-input:focus{outline:2px solid var(--teal);}

.btn.secondary{background:var(--card);color:var(--text2);border:1px solid var(--border);}

/* Timeline */
.tl-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}

.seg{display:flex;gap:6px;flex-wrap:wrap;}

.file-drop input{display:none;}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border-radius:20px;padding:4px 10px 4px 4px;font-size:12px;margin:4px 4px 0 0;}
.file-chip button{color:var(--red);font-size:14px;}

/* history table */
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.hist-row:last-child{border-bottom:none;}
.hist-date{color:var(--text3);font-family:'DM Mono',monospace;font-size:12px;}
.spark{width:100%;height:60px;margin-top:6px;}

/* AI */
.ai-box{background:var(--tl);border:1px solid rgba(15,110,86,0.18);border-radius:14px;padding:1rem;margin-bottom:1rem;}
.ai-disclaimer{font-size:11.5px;color:#3d5c52;background:rgba(255,255,255,0.55);border-radius:8px;padding:8px 10px;line-height:1.7;margin-bottom:10px;}
.ai-response{font-size:13.5px;line-height:2;white-space:pre-wrap;color:var(--text);}
.ai-thinking{color:var(--text3);font-style:italic;font-size:13px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(20,25,20,0.45);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:1.4rem 1.2rem calc(1.4rem + env(safe-area-inset-bottom));max-width:520px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.modal-btns .btn{flex:1;text-align:center;}
.api-tab-row{display:flex;gap:8px;margin-bottom:12px;}
.api-tab{flex:1;text-align:center;padding:8px;border-radius:10px;border:1px solid var(--border);background:var(--bg);font-size:13px;}
.api-tab.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.key-status{font-size:10px;padding:2px 8px;border-radius:20px;margin-left:6px;}
.key-status.ok{background:#dcf3e6;color:#1d7a4c;}
.key-status.empty{background:var(--bg2);color:var(--text3);}

/* Exercise */
.ex-hero{text-align:center;padding:1.5rem 0;}
.ring-wrap{position:relative;width:150px;height:150px;margin:0 auto 14px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--bg2);stroke-width:9;}
.ring-fg{fill:none;stroke:var(--teal);stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;font-family:'DM Mono',monospace;color:var(--td);}
.ex-title{font-size:20px;font-weight:700;}
.ex-badge{display:inline-block;font-size:11px;padding:3px 12px;border-radius:20px;background:var(--tl);color:var(--td);margin-top:6px;}
.ex-icon-box{width:100%;aspect-ratio:16/10;background:var(--tl);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.ex-icon-box i{font-size:56px;color:var(--td);}
.ex-inst{font-size:14px;line-height:1.9;color:var(--text2);margin-bottom:14px;}
.ex-inst strong{color:var(--td);}
.chip-row{display:flex;gap:8px;margin-bottom:14px;}
.chip{flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center;}
.chip .l{font-size:10px;color:var(--text3);}
.chip .v{font-size:15px;font-weight:700;margin-top:2px;}
.chip-adj{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:4px;}
.chip-adj button{width:26px;height:26px;border-radius:8px;background:var(--bg2);font-size:15px;}
.mode-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center;margin-bottom:1rem;}
.mode-card i{font-size:34px;color:var(--teal);margin-bottom:10px;display:block;}

.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:13px;line-height:1.9;}
.empty i{font-size:32px;opacity:0.4;margin-bottom:10px;display:block;}
footer-note{display:block;text-align:center;font-size:11px;color:var(--text3);margin-top:1.5rem;line-height:1.9;}
</style>

<body>

<div id="app"></div>

<!-- Modal container -->
<div id="modalRoot"></div>

<script>
/* ══════════════════════════════════════════════
   IndexedDB helper
══════════════════════════════════════════════ */
const DB_NAME = 'recoveryTrackerDB';
const DB_VERSION = 2;
const STORES = ['timeline','attachments','symptomLogs','gaitLogs','exerciseLogs','kv','caseNotes'];
let _db = null;
function openDB(){
  return new Promise((resolve, reject) => {
    if (_db) return resolve(_db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      STORES.forEach(s => { if (!db.objectStoreNames.contains(s)) db.createObjectStore(s, { keyPath: 'id' }); });
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = e => reject(e);
  });
}
async function dbGetAll(store){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly').objectStore(store).getAll();
    tx.onsuccess = () => res(tx.result || []);
    tx.onerror = rej;
  });
}
async function dbGet(store, id){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly').objectStore(store).get(id);
    tx.onsuccess = () => res(tx.result || null);
    tx.onerror = rej;
  });
}
async function dbPut(store, obj, opts){
  const db = await openDB();
  await new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite').objectStore(store).put(obj);
    tx.onsuccess = () => res(obj);
    tx.onerror = rej;
  });
  if (!(opts && opts.skipCloud)) cloudPush(store, obj);
  return obj;
}
async function dbDel(store, id, opts){
  const db = await openDB();
  await new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite').objectStore(store).delete(id);
    tx.onsuccess = () => res();
    tx.onerror = rej;
  });
  if (!(opts && opts.skipCloud)) cloudDelete(store, id);
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

/* ══════════════════════════════════════════════
   Cloud Sync (Firebase — optional, off until 設定 saved + 登入)
   API Key／密碼雜湊等敏感設定（kv）永遠不會同步到雲端。
══════════════════════════════════════════════ */
let fbApp = null, fbAuth = null, fbDb = null, fbStorage = null, fbUser = null;
const CLOUD_STORES = ['timeline','attachments','symptomLogs','gaitLogs','exerciseLogs','caseNotes'];

function initFirebase(){
  if (fbApp) return true;
  const cfg = settings.fbConfig;
  if (!cfg || typeof firebase === 'undefined') return false;
  try{
    fbApp = firebase.apps && firebase.apps.length ? firebase.app() : firebase.initializeApp(cfg);
    fbAuth = firebase.auth();
    fbDb = firebase.firestore();
    fbStorage = firebase.storage();
    fbAuth.onAuthStateChanged(u => { fbUser = u; if (view === 'settings') render(); });
    return true;
  }catch(e){ console.error('Firebase init failed', e); return false; }
}
async function fbSignUp(email, pw){
  if (!initFirebase()) throw new Error('請先儲存 Firebase 設定');
  await fbAuth.createUserWithEmailAndPassword(email, pw);
}
async function fbSignIn(email, pw){
  if (!initFirebase()) throw new Error('請先儲存 Firebase 設定');
  await fbAuth.signInWithEmailAndPassword(email, pw);
}
async function fbSignOut(){ if (fbAuth) await fbAuth.signOut(); }
function cloudReady(){ return !!(fbApp && fbAuth && fbAuth.currentUser); }

async function cloudPush(store, obj){
  if (!CLOUD_STORES.includes(store) || !cloudReady()) return;
  try{
    const uidc = fbAuth.currentUser.uid;
    if (store === 'attachments' && obj.dataUrl && obj.dataUrl.startsWith('data:')){
      const ref = fbStorage.ref(`users/${uidc}/attachments/${obj.id}`);
      await ref.putString(obj.dataUrl, 'data_url');
      const url = await ref.getDownloadURL();
      await fbDb.collection('users').doc(uidc).collection(store).doc(obj.id).set({ ...obj, dataUrl: url }, { merge:true });
    } else {
      await fbDb.collection('users').doc(uidc).collection(store).doc(obj.id).set(obj, { merge:true });
    }
  }catch(e){ console.error('cloudPush failed', store, e); }
}
async function cloudDelete(store, id){
  if (!CLOUD_STORES.includes(store) || !cloudReady()) return;
  try{
    const uidc = fbAuth.currentUser.uid;
    await fbDb.collection('users').doc(uidc).collection(store).doc(id).delete();
    if (store === 'attachments'){ try{ await fbStorage.ref(`users/${uidc}/attachments/${id}`).delete(); }catch(e){} }
  }catch(e){ console.error('cloudDelete failed', store, e); }
}
async function cloudPullAll(){
  if (!cloudReady()) throw new Error('請先登入雲端帳號');
  const uidc = fbAuth.currentUser.uid;
  let count = 0;
  for (const store of CLOUD_STORES){
    const snap = await fbDb.collection('users').doc(uidc).collection(store).get();
    for (const doc of snap.docs){ await dbPut(store, doc.data(), { skipCloud:true }); count++; }
  }
  return count;
}
async function cloudPushAllLocal(){
  if (!cloudReady()) throw new Error('請先登入雲端帳號');
  let count = 0;
  for (const store of CLOUD_STORES){
    const rows = await dbGetAll(store);
    for (const row of rows){ await cloudPush(store, row); count++; }
  }
  return count;
}

/* ══════════════════════════════════════════════
   Seed data — from user-provided surgical history
══════════════════════════════════════════════ */
const SEED_TIMELINE = [
  { id:'seed1', date:'2023-10-01', type:'surgery', title:'右側腓總神經神經瘤切除手術', hospital:'北港仁一醫院',
    desc:'手術後立即發生右側垂足（Foot Drop），足背屈功能喪失。術後約第五天再次進行清創手術。', doctorConclusion:'' },
  { id:'seed2', date:'2023-10-06', type:'surgery', title:'傷口清創手術', hospital:'北港仁一醫院',
    desc:'因第一次手術後傷口狀況接受清創處理。', doctorConclusion:'' },
  { id:'seed3', date:'2024-03-01', type:'surgery', title:'神經重建手術（人工神經移植）', hospital:'義大醫院',
    desc:'針對右側腓總神經損傷進行神經重建，手術費用約新臺幣 50 萬元。', doctorConclusion:'' },
  { id:'seed4', date:'2024-03-15', type:'surgery', title:'脛後肌肌腱轉位手術（Tendon Transfer）', hospital:'義大醫院',
    desc:'將脛後肌肌腱轉位至足背，以改善垂足及足背屈功能。', doctorConclusion:'' },
  { id:'seed5', date:'2025-03-07', type:'surgery', title:'腰椎椎間盤突出切除手術（未做脊椎融合）', hospital:'',
    desc:'因巨大腰椎椎間盤突出接受間盤切除手術，未施行脊椎融合，目前恢復良好。', doctorConclusion:'' },
];
const TL_TYPES = {
  surgery:{label:'手術', icon:'ti-scissors', color:'var(--red)'},
  visit:{label:'回診', icon:'ti-stethoscope', color:'var(--blue)'},
  emg:{label:'EMG／神經傳導', icon:'ti-activity', color:'var(--teal)'},
  imaging:{label:'影像檢查', icon:'ti-x-ray', color:'var(--amb)'},
  medication:{label:'用藥', icon:'ti-pill', color:'var(--text2)'},
};

/* ══════════════════════════════════════════════
   App State
══════════════════════════════════════════════ */
let view = 'loading';
let viewParams = {};
let unlocked = false;
let settings = {};

async function loadSettings(){
  const rows = await dbGetAll('kv');
  settings = {};
  rows.forEach(r => settings[r.id] = r.value);
}
async function saveSetting(key, value){
  settings[key] = value;
  await dbPut('kv', { id:key, value });
}

async function ensureSeed(){
  const existing = await dbGetAll('timeline');
  if (existing.length === 0){
    for (const t of SEED_TIMELINE) await dbPut('timeline', t);
  }
}

async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function init(){
  await loadSettings();
  await ensureSeed();
  if (settings.fbConfig) initFirebase();
  if (!settings.pwHash){
    view = 'setup-password';
  } else if (localStorage.getItem('rt_unlocked') === '1'){
    unlocked = true;
    view = 'home';
  } else {
    view = 'lock';
  }
  render();
}
init();

function goto(v, params){ view = v; viewParams = params || {}; render(); window.scrollTo(0,0); }

/* ══════════════════════════════════════════════
   Render dispatcher
══════════════════════════════════════════════ */
async function render(){
  const app = document.getElementById('app');
  if (view === 'loading'){ app.innerHTML = ''; return; }
  if (view === 'setup-password'){ app.innerHTML = setupPasswordHTML(); return; }
  if (view === 'lock'){ app.innerHTML = lockHTML(); return; }

  let body = '';
  if (view === 'home') body = await homeHTML();
  else if (view === 'timeline') body = await timelineHTML();
  else if (view === 'timelineForm') body = timelineFormHTML(viewParams.id);
  else if (view === 'reports') body = await reportsHTML();
  else if (view === 'caseSummary') body = await caseSummaryHTML();
  else if (view === 'symptom') body = await symptomHTML();
  else if (view === 'symptomForm') body = symptomFormHTML();
  else if (view === 'gait') body = await gaitHTML();
  else if (view === 'gaitForm') body = gaitFormHTML();
  else if (view === 'exercise') body = exerciseHomeHTML();
  else if (view === 'exWarm') body = warmHTML();
  else if (view === 'exRehab') body = rehabHTML();
  else if (view === 'ai') body = await aiHTML();
  else if (view === 'settings') body = await settingsHTML();

  app.innerHTML = `<div class="container">${body}</div>` + tabbarHTML();
  afterRender();
}

function tabbarHTML(){
  const tabs = [
    {v:'home', icon:'ti-home', label:'首頁'},
    {v:'timeline', icon:'ti-timeline', label:'病歷'},
    {v:'symptom', icon:'ti-clipboard-heart', label:'症狀'},

  return `<div class="tabbar">${tabs.map(t => `

    </button>`).join('')}</div>`;
}

function daysSince(dateStr){
  const d1 = new Date(dateStr); const d2 = new Date();
  return Math.floor((d2 - d1) / 86400000);
}
async function computeAlerts(){
  const alerts = [];
  const symptomLogs = (await dbGetAll('symptomLogs')).sort((a,b)=>b.date.localeCompare(a.date));

  if (symptomLogs.length >= 6){
    const recent3 = symptomLogs.slice(0,3).reduce((s,l)=>s+(l.dorsiStrength||0),0)/3;
    const prev3 = symptomLogs.slice(3,6).reduce((s,l)=>s+(l.dorsiStrength||0),0)/3;
    if (recent3 < prev3 - 0.8){
      alerts.push({level:'warn', icon:'ti-trending-down', text:'背屈肌力自評分數近期呈現下降趨勢，建議在下次回診時特別提出討論。'});
    }
  }
  return alerts;
}

function segPick(containerId, el){
  document.getElementById(containerId).querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('on'));

}
let _pendingFiles = [];
function handleTlFiles(e){
  const files = Array.from(e.target.files);
  let remaining = files.length;
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = () => {
      _pendingFiles.push({ id: uid(), name: f.name, dataUrl: reader.result });
      const chipHtml = `<span class="file-chip" data-pending="${_pendingFiles[_pendingFiles.length-1].id}"><i class="ti ti-paperclip"></i>${escapeHtml(f.name)}<button onclick="this.parentElement.remove()">✕</button></span>`;
      document.getElementById('tlFileChips').insertAdjacentHTML('beforeend', chipHtml);
    };
    reader.readAsDataURL(f);
  });
}
async function removeAttChip(attId){
  await dbDel('attachments', attId);
  document.querySelector(`[data-att="${attId}"]`)?.remove();
}
async function saveTimelineItem(id){
  const type = document.querySelector('#tlTypeSeg .seg-btn.on')?.dataset.val || 'visit';
  const item = {
    id, date: document.getElementById('tlDate').value,
    type, title: document.getElementById('tlTitle').value.trim(),
    hospital: document.getElementById('tlHospital').value.trim(),
    desc: document.getElementById('tlDesc').value.trim(),
    historyDesc: document.getElementById('tlHistoryDesc').value.trim(),
    doctorConclusion: document.getElementById('tlConcl').value.trim(),
  };
  if (!item.title){ alert('請輸入標題'); return; }
  await dbPut('timeline', item);
  for (const f of _pendingFiles){
    await dbPut('attachments', { id:f.id, timelineId:id, name:f.name, dataUrl:f.dataUrl });
  }
  _pendingFiles = [];
  goto('timeline');
}
async function deleteTimelineItem(id){
  if (!confirm('確定刪除這筆病歷事件？相關附件也會一併刪除。')) return;
  await dbDel('timeline', id);
  const atts = (await dbGetAll('attachments')).filter(a=>a.timelineId===id);
  for (const a of atts) await dbDel('attachments', a.id);
  goto('timeline');
}

let _qrPendingFiles = [];
function handleQrFiles(e){
  const files = Array.from(e.target.files);
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = () => {
      const rec = { id: uid(), name: f.name, dataUrl: reader.result };
      _qrPendingFiles.push(rec);
      document.getElementById('qrFileChips').insertAdjacentHTML('beforeend',
        `<span class="file-chip" data-pending="${rec.id}"><i class="ti ti-paperclip"></i>${escapeHtml(f.name)}<button onclick="this.parentElement.remove();_qrPendingFiles=_qrPendingFiles.filter(x=>x.id!=='${rec.id}')">✕</button></span>`);
    };
    reader.readAsDataURL(f);
  });
}
async function saveQuickReport(){
  if (_qrPendingFiles.length === 0){ alert('請至少選擇一個檔案'); return; }
  const type = document.querySelector('#qrTypeSeg .seg-btn.on')?.dataset.val || 'emg';
  const date = document.getElementById('qrDate').value;
  const title = document.getElementById('qrTitle').value.trim() || (TL_TYPES[type]?.label || '檢查報告');
  const tlId = uid();
  await dbPut('timeline', { id: tlId, date, type, title, hospital:'', desc:'', historyDesc:'', doctorConclusion:'' });
  for (const f of _qrPendingFiles){
    await dbPut('attachments', { id: f.id, timelineId: tlId, name: f.name, dataUrl: f.dataUrl });
  }
  _qrPendingFiles = [];
  goto('reports');
}
async function removeReportAttachment(attId){
  if (!confirm('確定刪除這個檔案？')) return;
  await dbDel('attachments', attId);

}

function sparklineHTML(logs){
  const sorted = [...logs].sort((a,b)=>a.date.localeCompare(b.date)).slice(-20);
  const w = 460, h = 60, pad = 4;
  const step = (w - pad*2) / Math.max(sorted.length-1,1);
  const pt = (arr,key,max) => arr.map((l,i)=>`${pad+i*step},${h-pad-((l[key]||0)/max)*(h-pad*2)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pt(sorted,'dorsiStrength',5)}" fill="none" stroke="var(--teal)" stroke-width="2"/>
  </svg>
  <div style="display:flex;gap:14px;font-size:11px;color:var(--text3);margin-top:4px;">
    <span><span style="color:var(--teal);">━</span> 背屈肌力</span>
  </div>`;
}

function spk(text){
  if (!voiceOn || !text) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-TW'; u.rate = 0.9;
    speechSynthesis.speak(u);
  }catch(e){}
}

function ringSVG(pct, size){
  size = size || 150;
  const r = (size/2) - 10, c = 2*Math.PI*r;
  const off = c * (1 - pct);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}"/>
    <circle class="ring-fg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
  </svg>`;
}

function getVal(id, key){
  if (custom[id] && custom[id][key] !== undefined) return custom[id][key];
  if (key === 'holdSec'){
    try{ const saved = localStorage.getItem('holdSec_'+id); if (saved!==null) return parseInt(saved); }catch(e){}
  }
  return DEFAULTS.find(e=>e.id===id)[key];
}
function isModified(id){
  const d = DEFAULTS.find(e=>e.id===id);
  if (!custom[id]) return false;
  return (custom[id].sets!==undefined && custom[id].sets!==d.sets) || (custom[id].holdSec!==undefined && custom[id].holdSec!==d.holdSec);
}
function updateChip(id, key, delta, min, max){
  if (!custom[id]) custom[id] = {};
  const newVal = Math.max(min, Math.min(max, getVal(id,key)+delta));
  custom[id][key] = newVal;
  if (key==='holdSec'){ try{ localStorage.setItem('holdSec_'+id, newVal); }catch(e){} }
  goto('exRehab');
}
function rehabHTML(){
  const ex = DEFAULTS[rcur];
  const sets = getVal(ex.id,'sets'), holdSec = getVal(ex.id,'holdSec');
  const done = cS[ex.id] || 0;
  return `
    <div class="topbar" style="padding-left:0;padding-right:0;">
      <button class="back" onclick="clearTimers();goto('exercise')"><i class="ti ti-arrow-left"></i></button>
      <h1>垂足復健 ${rcur+1}/${DEFAULTS.length}</h1>
    </div>

      <div class="ex-title">${ex.title}</div>
      <div class="ex-badge">${ex.badge}</div>
    </div>
    <div class="ex-icon-box"><i class="ti ${ex.icon}"></i></div>
    <p class="ex-inst">${ex.inst}</p>
    <div class="chip-row">
      <div class="chip"><div class="l">組數</div><div class="v">${sets}</div><div class="chip-adj"><button onclick="updateChip('${ex.id}','sets',-1,1,6)">－</button><button onclick="updateChip('${ex.id}','sets',1,1,6)">＋</button></div></div>
      <div class="chip"><div class="l">維持秒數</div><div class="v">${holdSec}s</div><div class="chip-adj"><button onclick="updateChip('${ex.id}','holdSec',-2,4,30)">－</button><button onclick="updateChip('${ex.id}','holdSec',2,4,30)">＋</button></div></div>
      <div class="chip"><div class="l">已完成</div><div class="v">${done}/${sets}</div></div>
    </div>
    <div class="modal-btns">
      <button class="btn secondary" onclick="cS[ex.id]=0;goto('exRehab')">重設</button>
      <button class="btn" id="rehabStartBtn" onclick="startEx()">開始這組</button>
    </div>
  `;
}
function startEx(){
  const ex = DEFAULTS[rcur];
  spk(ex.vc.s);
  setTimeout(()=>runSet(ex.id, ex, (cS[ex.id]||0)+1), 1000);
}
function runSet(id, ex, n){
  const holdSec = getVal(id,'holdSec');
  let rem = holdSec;
  clearInterval(tmr);
  tmr = setInterval(()=>{
    rem--;
    const numEl = document.getElementById('rehabNum'); const ringEl = document.getElementById('rehabRing');
    if (numEl) numEl.textContent = Math.max(rem,0);
    if (ringEl) ringEl.innerHTML = ringSVG(1-rem/holdSec).match(/<svg[\s\S]*<\/svg>/)[0];
    if (rem <= 0){
      clearInterval(tmr);
      cS[id] = n; totS++;
      const sets = getVal(id,'sets');
      if (cS[id] >= sets){ mkDone(); }
      else { spk(ex.vc.e); runRest(id, ex, n+1, ex.restSec); }
    }
  },1000);
}
function runRest(id, ex, nxt, rs){
  let rem = rs;
  clearInterval(tmr);
  goto('exRehab');
  const label = document.getElementById('rehabNum');
  tmr = setInterval(()=>{
    rem--;
    if (label) label.textContent = rem>0? '休息 '+rem : '開始';
    if (rem <= 0){ clearInterval(tmr); runSet(id, ex, nxt); }
  },1000);
}
function mkDone(){
  const ex = DEFAULTS[rcur];
  dbPut('exerciseLogs', { id: uid(), date: new Date().toISOString().slice(0,10), module:'rehab', label: ex.title, sets: cS[ex.id] });
  if (!isModified(ex.id) && rcur < DEFAULTS.length - 1){
    let rem = 15;
    goto('exRehab');
    const numEl = document.getElementById('rehabNum');
    tmr = setInterval(()=>{
      rem--;
      if (numEl) numEl.textContent = rem>0 ? rem+'s 後下一項' : '';
      if (rem<=0){ clearInterval(tmr); rcur++; goto('exRehab'); }
    },1000);
  } else if (rcur < DEFAULTS.length - 1){
    goto('exRehab');
  } else {
    goto('exercise');
  }
}

const GEMINI_MODEL_CANDIDATES = ['gemini-2.5-flash','gemini-2.0-flash','gemini-1.5-flash','gemini-1.5-flash-8b','gemini-1.5-pro','gemini-1.0-pro','gemini-pro'];
const OPENAI_MODEL = 'gpt-4o-mini';
function getActiveAI(){

async function buildContextText(){
  const timeline = (await dbGetAll('timeline')).sort((a,b)=>a.date.localeCompare(b.date));
  const symptomLogs = (await dbGetAll('symptomLogs')).sort((a,b)=>a.date.localeCompare(b.date));
  const gaitLogs = (await dbGetAll('gaitLogs')).sort((a,b)=>a.date.localeCompare(b.date));
  const exLogs = (await dbGetAll('exerciseLogs')).sort((a,b)=>a.date.localeCompare(b.date));
  const caseNotes = (await dbGetAll('caseNotes')).sort((a,b)=>a.date.localeCompare(b.date));

  const tlText = timeline.map(t => `- ${t.date}［${TL_TYPES[t.type]?.label||t.type}］${t.title}${t.hospital?'（'+t.hospital+'）':''}：${t.desc||''}${t.historyDesc? '｜病史描述：'+t.historyDesc : ''}${t.doctorConclusion? '｜醫師結論：'+t.doctorConclusion : ''}`).join('\n');
  const symText = symptomLogs.slice(-30).map(l => `- ${l.date}${l.time?' '+l.time:''} 背屈肌力${l.dorsiStrength}/5，麻木「${l.numbnessArea||'無'}」嚴重度${l.numbnessSeverity}/10，足底筋膜：${(l.plantarFascia&&l.plantarFascia.length)?l.plantarFascia.map(k=>(FASCIA_ZONES.find(z=>z.k===k)||{}).l||k).join('、'):'無'}${l.note?'，備註：'+l.note:''}`).join('\n');
  const gaitText = gaitLogs.slice(-30).map(l => `- ${l.date}${l.usedAFO?'（有使用AFO／護具）':''}：${l.note||''}`).join('\n');
  const exText = `近期復健運動完成次數：${exLogs.length} 次`;
  const csText = caseNotes.map(n => `- ${n.date}：${n.text}`).join('\n');

  return `【病例簡述／病史背景】\n${csText||'（無資料）'}\n\n【病歷時間軸】\n${tlText||'（無資料）'}\n\n【症狀日誌】\n${symText||'（無資料）'}\n\n【步態與功能】\n${gaitText||'（無資料）'}\n\n【運動紀錄】\n${exText}`;
}
async function callGeminiAuto(prompt){
  const key = settings.geminiKey;
  const ordered = settings.geminiWorkingModel
    ? [settings.geminiWorkingModel, ...GEMINI_MODEL_CANDIDATES.filter(m=>m!==settings.geminiWorkingModel)]
    : GEMINI_MODEL_CANDIDATES;
  let lastErr = null;
  for (const model of ordered){
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}] })
    });
    const data = await resp.json().catch(()=>({}));
    if (resp.ok){
      if (settings.geminiWorkingModel !== model) saveSetting('geminiWorkingModel', model);
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }
    const msg = data.error?.message || resp.statusText;
    lastErr = new Error(msg);
    const isModelIssue = resp.status === 404 || /not found|not supported|does not exist/i.test(msg);
    if (!isModelIssue) throw lastErr; // 金鑰錯誤／額度用盡等其他問題，直接中止不用再試其他版本
  }
  throw lastErr || new Error('所有 Gemini 模型版本皆嘗試失敗');
}
async function callAI(prompt){
  const ai = getActiveAI();
  if (ai === 'gemini'){
    return await callGeminiAuto(prompt);
  } else {
    const resp = await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${settings.openaiKey}`},
      body: JSON.stringify({ model: OPENAI_MODEL, messages:[{role:'user',content:prompt}], max_tokens:900, temperature:0.4 })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || resp.statusText);
    return data.choices?.[0]?.message?.content || '';
  }
}
const AI_SAFETY_INSTRUCTION = `你是一位協助整理個人復健紀錄的助理，服務對象正在恢復右側垂足（腓總神經損傷術後＋肌腱轉位），同時有腰椎椎間盤突出手術病史。

- 若使用者的紀錄顯示某些變化「可能」值得跟醫師討論，只能用「建議與您的醫師討論」的措辭，不能給出像是「這代表你的神經沒有恢復」這類確定性判斷。

  out.innerHTML = '<p class="ai-thinking">正在整理步態與姿勢衛教建議，請稍候…</p>';
  try{
    const ctx = await buildContextText();
    const prompt = `${AI_SAFETY_INSTRUCTION}\n\n以下是使用者的完整紀錄：\n${ctx}\n\n請提供「步態與復健姿勢」方面的一般性衛教建議（這是通用衛教資訊，不是根據觸診或評估的個人化醫療處方）：\n1) 根據紀錄中的步態穩定度、跌倒次數、AFO 使用、以及復健運動完成狀況，指出 2-3 個常見的、通用的步態訓練原則或動作提示（例如高抬腿走法、腳跟先著地的提示語、重心轉移練習、常見代償動作提醒等物理治療衛教常見內容）。\n2) 提醒使用者在執行目前復健運動時，容易被忽略的動作細節。\n3) 明確列出：哪些狀況應該直接請教物理治療師或醫師調整訓練或輔具，而不是自行嘗試改變。\n請在開頭清楚說明這些只是一般性衛教原則，無法取代物理治療師實際觸診評估後給的個人化指導，且不構成醫療建議。約 350-450 字，繁體中文，條列清晰。`;
    const text = await callAI(prompt);
    out.innerHTML = `<p class="ai-response">${escapeHtml(text)}</p>`;
  }catch(e){
    out.innerHTML = `<p style="color:var(--red);font-size:13px;">發生錯誤：${escapeHtml(e.message)}</p>`;
  }
}

        <div class="modal-btns"><button class="btn" onclick="saveKeyField('openaiKey','openaiKeyInput')">儲存</button><button class="btn secondary" onclick="clearKeyField('openaiKey')">清除</button></div>
      `}
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-lock"></i>安全</div>
      <button class="btn secondary" style="width:100%;margin-bottom:8px;" onclick="lockApp()"><i class="ti ti-lock"></i> 立即鎖定</button>
      <button class="btn secondary" style="width:100%;" onclick="promptChangePassword()">變更密碼</button>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-database-export"></i>資料備份</div>
      <p style="font-size:12px;color:var(--text3);margin-bottom:10px;">資料存在您瀏覽器的本機資料庫，清除瀏覽器資料會遺失，請定期匯出備份。</p>
      <div class="modal-btns">
        <button class="btn secondary" onclick="exportData()"><i class="ti ti-download"></i> 匯出備份</button>
        <button class="btn secondary" onclick="document.getElementById('importFile').click()"><i class="ti ti-upload"></i> 匯入備份</button>

async function saveKeyField(settingKey, inputId){
  const v = document.getElementById(inputId).value.trim();
  await saveSetting(settingKey, v);
  render();
}
async function clearKeyField(settingKey){
  await saveSetting(settingKey, '');
  render();
}
async function saveFirebaseConfigField(){
  const raw = document.getElementById('fbConfigInput').value.trim();
  if (!raw){ await saveSetting('fbConfig', null); fbApp=null; fbAuth=null; fbDb=null; fbStorage=null; fbUser=null; render(); return; }
  try{
    const cfg = Function('"use strict"; return (' + raw + ')')();
    if (!cfg || !cfg.apiKey || !cfg.projectId) throw new Error('缺少必要欄位（apiKey / projectId）');
    await saveSetting('fbConfig', cfg);
    fbApp = null; fbAuth = null; fbDb = null; fbStorage = null; fbUser = null;
    initFirebase();
    alert('Firebase 設定已儲存');
    render();
  }catch(e){
    alert('設定物件格式不正確，請確認貼上的內容：' + e.message);
  }
}
async function fbDoSignUp(){
  const email = document.getElementById('fbEmail').value.trim();
  const pw = document.getElementById('fbPw').value;
  if (!email || pw.length < 6){ alert('請輸入 Email 及至少 6 碼密碼'); return; }
  try{ await fbSignUp(email, pw); render(); }catch(e){ alert('註冊失敗：' + e.message); }
}
async function fbDoSignIn(){
  const email = document.getElementById('fbEmail').value.trim();
  const pw = document.getElementById('fbPw').value;
  if (!email || !pw){ alert('請輸入 Email 及密碼'); return; }
  try{ await fbSignIn(email, pw); render(); }catch(e){ alert('登入失敗：' + e.message); }
}
async function fbDoSignOut(){ await fbSignOut(); render(); }
async function doCloudPushAllLocal(){
  if (!confirm('確定要把本機所有病例簡述／病歷／症狀／運動紀錄上傳到雲端嗎？')) return;
  try{ const n = await cloudPushAllLocal(); alert(`已上傳 ${n} 筆資料到雲端`); }
  catch(e){ alert('上傳失敗：' + e.message); }
}
async function doCloudPullAll(){
  if (!confirm('確定要把雲端資料下載合併到這台裝置嗎？（相同 ID 會被覆蓋）')) return;
  try{ const n = await cloudPullAll(); alert(`已從雲端下載 ${n} 筆資料`); goto('home'); }
  catch(e){ alert('下載失敗：' + e.message); }
}
async function promptChangePassword(){
  const cur = prompt('請輸入目前密碼：');
  if (cur === null) return;
  const hash = await sha256(cur);
  if (hash !== settings.pwHash){ alert('目前密碼不正確'); return; }
  const np1 = prompt('請輸入新密碼（至少 4 碼）：');
  if (!np1 || np1.length < 4){ alert('密碼至少 4 碼'); return; }
  const np2 = prompt('請再輸入一次新密碼：');
  if (np1 !== np2){ alert('兩次輸入不一致'); return; }
  await saveSetting('pwHash', await sha256(np1));
  alert('密碼已更新');
}
async function exportData(){
  const data = {};
  for (const s of STORES) data[s] = await dbGetAll(s);
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `recovery-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
async function importData(e){
  const file = e.target.files[0];
  if (!file) return;
  if (!confirm('匯入將會與現有資料合併（相同 ID 會被覆蓋），確定要繼續嗎？')) return;
  const text = await file.text();
  try{
    const data = JSON.parse(text);
    for (const s of STORES){
      if (Array.isArray(data[s])){
        for (const row of data[s]) await dbPut(s, row);
      }
    }
    await loadSettings();
    alert('匯入完成');
    goto('home');
  }catch(err){
    alert('匯入失敗：檔案格式錯誤');
  }
}

/* Hook form renders after navigation (since goto() sets innerHTML synchronously before async form load) */
const _origGoto = goto;
goto = function(v, params){
  _origGoto(v, params);
  setTimeout(()=>{
    if (v === 'timelineForm') renderTimelineForm(params && params.id);
    if (v === 'symptomForm') renderSymptomForm(params && params.id);
    if (v === 'gaitForm') renderGaitForm(params && params.id);
  }, 0);
};
</script>
